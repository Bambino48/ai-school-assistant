<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant IA Scolaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
        }

        .chat-wrapper {
            max-width: 900px;
            margin: 40px auto;
        }

        .chat-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #0d6efd, #4f8dfd);
            color: white;
            padding: 20px;
        }

        .chat-body {
            background: white;
            height: 500px;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user .bubble {
            background: #0d6efd;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: #e9f2ff;
            color: #1c1c1c;
            border-bottom-left-radius: 4px;
        }

        .chat-footer {
            background: #fff;
            padding: 16px;
            border-top: 1px solid #eee;
        }

        .typing {
            font-style: italic;
            color: #6c757d;
            margin-top: 8px;
        }

        .chat-title {
            font-weight: 700;
            margin: 0;
        }

        .chat-subtitle {
            margin: 4px 0 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="chat-wrapper">
        <div class="card chat-card">
            <div class="chat-header">
                <h1 class="chat-title">Assistant IA d’orientation scolaire</h1>
                <p class="chat-subtitle">Pose ta question sur les filières, les études et l’orientation.</p>
            </div>

            <div id="chatBox" class="chat-body">
                <div class="message bot">
                    <div class="bubble">
                        Bonjour 👋 Je suis ton assistant d’orientation scolaire. Pose-moi une question.
                    </div>
                </div>
            </div>

            <div class="chat-footer">
                <div class="input-group">
                    <input
                            type="text"
                            id="messageInput"
                            class="form-control"
                            placeholder="Exemple : Quelle filière choisir après le bac ?"
                    >
                    <button class="btn btn-primary" id="sendButton">Envoyer</button>
                </div>
                <div id="typingIndicator" class="typing d-none">L’assistant réfléchit...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const typingIndicator = document.getElementById("typingIndicator");

    function addMessage(content, sender) {
        const messageDiv = document.createElement("div");
        messageDiv.classList.add("message", sender);

        const bubbleDiv = document.createElement("div");
        bubbleDiv.classList.add("bubble");

        bubbleDiv.innerHTML = formatMessage(content);

        messageDiv.appendChild(bubbleDiv);
        chatBox.appendChild(messageDiv);

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function formatMessage(text) {
        return text
            .replace(/\n/g, "<br>")
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    }

    async function sendMessage() {
        const message = messageInput.value.trim();

        if (!message) {
            return;
        }

        addMessage(message, "user");
        messageInput.value = "";
        typingIndicator.classList.remove("d-none");
        sendButton.disabled = true;
        messageInput.disabled = true;

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: message })
            });

            if (!response.ok) {
                throw new Error("Erreur HTTP : " + response.status);
            }

            const data = await response.json();

            if (data.status === "success") {
                addMessage(data.message, "bot");
            } else {
                addMessage("Une erreur est survenue : " + data.message, "bot");
            }

        } catch (error) {
            addMessage("Impossible de contacter le serveur ou l’IA.", "bot");
            console.error(error);
        } finally {
            typingIndicator.classList.add("d-none");
            sendButton.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    sendButton.addEventListener("click", sendMessage);

    messageInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
