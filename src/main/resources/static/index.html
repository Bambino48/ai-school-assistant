<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant IA Scolaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
        }

        .app-wrapper {
            max-width: 1200px;
            margin: 30px auto;
        }

        .history-panel {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            height: 650px;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #0d6efd, #4f8dfd);
            color: white;
            padding: 20px;
        }

        .chat-body {
            background: white;
            height: 500px;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user .bubble {
            background: #0d6efd;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: #e9f2ff;
            color: #1c1c1c;
            border-bottom-left-radius: 4px;
        }

        .chat-footer {
            background: #fff;
            padding: 16px;
            border-top: 1px solid #eee;
        }

        .typing {
            font-style: italic;
            color: #6c757d;
            margin-top: 8px;
        }

        .history-item {
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .history-item:hover {
            background: #f1f6ff;
        }

        .history-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .history-date {
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="container app-wrapper">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="history-panel">
                <h4 class="mb-3">Historique</h4>
                <div id="historyList"></div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card chat-card">
                <div class="chat-header">
                    <h2 class="mb-1">Assistant IA d’orientation scolaire</h2>
                    <p class="mb-0">Pose ta question sur les filières, les études et l’orientation.</p>
                </div>

                <div id="chatBox" class="chat-body">
                    <div class="message bot">
                        <div class="bubble">
                            Bonjour 👋 Je suis ton assistant d’orientation scolaire. Pose-moi une question.
                        </div>
                    </div>
                </div>

                <div class="chat-footer">
                    <div class="input-group">
                        <input
                                type="text"
                                id="messageInput"
                                class="form-control"
                                placeholder="Exemple : Quelle filière choisir après le bac ?">
                        <button class="btn btn-primary" id="sendButton">Envoyer</button>
                    </div>
                    <div id="typingIndicator" class="typing d-none">L’assistant réfléchit...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const historyList = document.getElementById("historyList");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const typingIndicator = document.getElementById("typingIndicator");

    function addMessage(content, sender) {
        const messageDiv = document.createElement("div");
        messageDiv.classList.add("message", sender);

        const bubbleDiv = document.createElement("div");
        bubbleDiv.classList.add("bubble");
        bubbleDiv.innerHTML = formatMessage(content);

        messageDiv.appendChild(bubbleDiv);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function formatMessage(text) {
        return text
            .replace(/\n/g, "<br>")
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    }

    async function sendMessage() {
        const message = messageInput.value.trim();

        if (!message) return;

        addMessage(message, "user");
        messageInput.value = "";

        typingIndicator.classList.remove("d-none");
        sendButton.disabled = true;
        messageInput.disabled = true;

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();

            if (response.ok && data.status === "success") {
                addMessage(data.message, "bot");
                loadConversations();
            } else {
                addMessage("Erreur : " + (data.message || "réponse invalide"), "bot");
            }

        } catch (error) {
            console.error(error);
            addMessage("Impossible de contacter le serveur ou l’IA.", "bot");
        } finally {
            typingIndicator.classList.add("d-none");
            sendButton.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    async function loadConversations() {
        try {
            const response = await fetch("/api/conversations");
            const conversations = await response.json();

            historyList.innerHTML = "";

            conversations
                .sort((a, b) => b.id - a.id)
                .forEach(conversation => {
                    const item = document.createElement("div");
                    item.classList.add("history-item");

                    item.innerHTML = `
                        <div class="history-title">Conversation #${conversation.id}</div>
                        <div class="history-date">${new Date(conversation.createdAt).toLocaleString()}</div>
                    `;

                    item.addEventListener("click", () => loadMessages(conversation.id));

                    historyList.appendChild(item);
                });

        } catch (error) {
            console.error("Erreur chargement historique :", error);
        }
    }

    async function loadMessages(conversationId) {
        try {
            const response = await fetch(`/api/conversations/${conversationId}/messages`);
            const messages = await response.json();

            chatBox.innerHTML = "";

            messages.forEach(message => {
                if (message.role === "USER") {
                    addMessage(message.content, "user");
                } else {
                    addMessage(message.content, "bot");
                }
            });

        } catch (error) {
            console.error("Erreur chargement messages :", error);
        }
    }

    sendButton.addEventListener("click", sendMessage);

    messageInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });

    loadConversations();
</script>

</body>
</html>
