<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant IA d’orientation scolaire</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-text">
                <h1>Historique</h1>
                <p>Retrouve tes conversations récentes</p>
            </div>

            <button id="newConversationButton" class="btn btn-outline" type="button">
                Nouvelle conversation
            </button>
        </div>

        <div id="historyList" class="history-list"></div>
    </aside>

    <main class="chat-panel">
        <header class="chat-header">
            <div class="chat-header-badge">Assistant intelligent</div>
            <h2>Assistant IA d’orientation scolaire</h2>
            <p>Pose ta question sur les filières, les études et l’orientation.</p>
        </header>

        <section id="chatBox" class="chat-box">
            <div class="message bot">
                <div class="bubble">
                    Bonjour 👋 Je suis ton assistant d’orientation scolaire. Pose-moi une question.
                </div>
            </div>
        </section>

        <footer class="chat-footer">
            <div class="composer">
                <textarea
                        id="messageInput"
                        rows="1"
                        placeholder="Exemple : Quelle filière choisir après le bac ?"></textarea>

                <button id="sendButton" class="btn btn-primary" type="button">
                    Envoyer
                </button>
            </div>

            <div id="typingIndicator" class="typing hidden">
                L’assistant écrit sa réponse
            </div>
        </footer>
    </main>
</div>

<script src="/js/app.js"></script>
</body>
</html>
