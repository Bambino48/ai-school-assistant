<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant IA Scolaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
        }

        .app-wrapper {
            max-width: 1200px;
            margin: 30px auto;
        }

        .history-panel {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            height: 650px;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #0d6efd, #4f8dfd);
            color: white;
            padding: 20px;
        }

        .chat-body {
            background: white;
            height: 500px;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user .bubble {
            background: #0d6efd;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: #e9f2ff;
            color: #1c1c1c;
            border-bottom-left-radius: 4px;
        }

        .chat-footer {
            background: #fff;
            padding: 16px;
            border-top: 1px solid #eee;
        }

        .typing {
            font-style: italic;
            color: #6c757d;
            margin-top: 8px;
        }

        .history-item {
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .history-item:hover {
            background: #f1f6ff;
        }

        .history-item.active {
            border: 2px solid #0d6efd;
            background: #eef5ff;
        }

        .history-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .history-date {
            font-size: 0.85rem;
            color: #6c757d;
        }

        .section-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
        }

        .empty-history {
            color: #6c757d;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container app-wrapper">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="history-panel">
                <div class="section-top">
                    <h4 class="mb-0">Historique</h4>
                    <button class="btn btn-outline-primary btn-sm" id="newConversationButton">
                        Nouvelle conversation
                    </button>
                </div>
                <div id="historyList"></div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card chat-card">
                <div class="chat-header">
                    <h2 class="mb-1">Assistant IA d’orientation scolaire</h2>
                    <p class="mb-0">Pose ta question sur les filières, les études et l’orientation.</p>
                </div>

                <div id="chatBox" class="chat-body">
                    <div class="message bot">
                        <div class="bubble">
                            Bonjour 👋 Je suis ton assistant d’orientation scolaire. Pose-moi une question.
                        </div>
                    </div>
                </div>

                <div class="chat-footer">
                    <div class="input-group">
                        <input
                                type="text"
                                id="messageInput"
                                class="form-control"
                                placeholder="Exemple : Quelle filière choisir après le bac ?">
                        <button class="btn btn-primary" id="sendButton">Envoyer</button>
                    </div>
                    <div id="typingIndicator" class="typing d-none">L’assistant réfléchit...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const historyList = document.getElementById("historyList");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const typingIndicator = document.getElementById("typingIndicator");
    const newConversationButton = document.getElementById("newConversationButton");

    let currentConversationId = null;

    function addMessage(content, sender) {
        const messageDiv = document.createElement("div");
        messageDiv.classList.add("message", sender);

        const bubbleDiv = document.createElement("div");
        bubbleDiv.classList.add("bubble");
        bubbleDiv.innerHTML = formatMessage(content);

        messageDiv.appendChild(bubbleDiv);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function formatMessage(text) {
        if (!text) return "";
        return text
            .replace(/\n/g, "<br>")
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    }

    function resetChatBox() {
        chatBox.innerHTML = `
            <div class="message bot">
                <div class="bubble">
                    Bonjour 👋 Je suis ton assistant d’orientation scolaire. Pose-moi une question.
                </div>
            </div>
        `;
    }

    function highlightActiveConversation() {
        const items = document.querySelectorAll(".history-item");
        items.forEach(item => {
            const conversationId = Number(item.dataset.id);
            if (conversationId === currentConversationId) {
                item.classList.add("active");
            } else {
                item.classList.remove("active");
            }
        });
    }

    async function sendMessage() {
        const message = messageInput.value.trim();

        if (!message) return;

        addMessage(message, "user");
        messageInput.value = "";

        typingIndicator.classList.remove("d-none");
        sendButton.disabled = true;
        messageInput.disabled = true;

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message,
                    conversationId: currentConversationId
                })
            });

            const data = await response.json();

            if (response.ok && data.status === "success") {
                addMessage(data.message, "bot");

                await loadConversations();

                if (!currentConversationId) {
                    const firstItem = document.querySelector(".history-item");
                    if (firstItem) {
                        currentConversationId = Number(firstItem.dataset.id);
                    }
                }

                highlightActiveConversation();
            } else {
                addMessage("Erreur : " + (data.message || "réponse invalide"), "bot");
            }

        } catch (error) {
            console.error("Erreur lors de l'envoi :", error);
            addMessage("Impossible de contacter le serveur ou l’IA.", "bot");
        } finally {
            typingIndicator.classList.add("d-none");
            sendButton.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    async function loadConversations() {
        try {
            const response = await fetch("/api/conversations");
            const conversations = await response.json();

            historyList.innerHTML = "";

            if (!conversations || conversations.length === 0) {
                historyList.innerHTML = `<p class="empty-history">Aucune conversation enregistrée.</p>`;
                return;
            }

            conversations
                .sort((a, b) => b.id - a.id)
                .forEach(conversation => {
                    const item = document.createElement("div");
                    item.classList.add("history-item");
                    item.dataset.id = conversation.id;

                    item.innerHTML = `
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="history-title">Conversation #${conversation.id}</div>
                                <div class="history-date">${new Date(conversation.createdAt).toLocaleString("fr-FR")}</div>
                            </div>
                            <button class="btn btn-sm btn-danger delete-btn">🗑</button>
                        </div>
                    `;

                    item.addEventListener("click", async () => {
                        currentConversationId = conversation.id;
                        await loadMessages(conversation.id);
                        highlightActiveConversation();
                    });

                    const deleteBtn = item.querySelector(".delete-btn");

                    deleteBtn.addEventListener("click", async (e) => {
                        e.stopPropagation();

                        if (!confirm("Supprimer cette conversation ?")) return;

                        try {
                            await fetch(`/api/conversations/${conversation.id}`, {
                                method: "DELETE"
                            });

                            if (currentConversationId === conversation.id) {
                                currentConversationId = null;
                                resetChatBox();
                            }

                            loadConversations();

                        } catch (error) {
                            console.error("Erreur suppression :", error);
                        }
                    });

                    historyList.appendChild(item);
                });

            highlightActiveConversation();

        } catch (error) {
            console.error("Erreur chargement historique :", error);
        }
    }

    async function loadMessages(conversationId) {
        try {
            const response = await fetch(`/api/conversations/${conversationId}/messages`);
            const messages = await response.json();

            chatBox.innerHTML = "";

            if (!messages || messages.length === 0) {
                resetChatBox();
                return;
            }

            messages.forEach(message => {
                if (message.role === "USER") {
                    addMessage(message.content, "user");
                } else {
                    addMessage(message.content, "bot");
                }
            });

        } catch (error) {
            console.error("Erreur chargement messages :", error);
        }
    }

    function startNewConversation() {
        currentConversationId = null;
        resetChatBox();
        highlightActiveConversation();
        messageInput.focus();
    }

    sendButton.addEventListener("click", sendMessage);

    messageInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });

    newConversationButton.addEventListener("click", startNewConversation);

    loadConversations();
</script>

</body>
</html>
